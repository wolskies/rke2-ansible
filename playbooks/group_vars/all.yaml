---
# User-configurable variables for the wolskinet.rke2_ansible collection.
# For a generated reference, see docs/variables.md.

# Component versions — pin for reproducibility
rke2_version: "v1.31.11+rke2r1"            # RKE2 release
helm_version: "v3.18.4"                    # Helm release
kube_vip_version: "v0.9.1"                 # kube-vip release
metallb_version: "v0.15.2"                 # MetalLB release

cert_manager_chart_version: "v1.18.2"      # cert-manager chart
traefik_chart_version: "37.0.0"            # Traefik chart
rancher_chart_version: "2.11.3"            # Rancher chart

longhorn_chart_version: "1.9.1"            # Longhorn chart
rook_ceph_operator_chart_version: "1.17.7" # Rook operator chart
rook_ceph_version: "v18.2.2"               # Ceph container image

# System and network
rke2_install_dir: "/usr/local/bin"         # RKE2 binary install directory
disable_networkmanager: true               # Remove NetworkManager (Canal CNI conflicts with it)

vip: "192.168.100.50"                      # kube-vip virtual IP for the control plane
vip_interface: "eth0"                      # Interface for the VIP; auto-detected if eth0 is absent
management_network: "192.168.100.0/24"     # Node management CIDR
lb_range: "192.168.100.240-192.168.100.254"  # MetalLB address pool
lb_pool_name: "first-pool"                 # MetalLB pool name

# Feature toggles
rke2_install_kubevip: true                 # Install kube-vip
rke2_install_metallb: true                 # Install MetalLB
rke2_install_certbot: true                 # Install cert-manager
rke2_install_traefik: true                 # Install Traefik

# Rancher / TLS
traefik_domain: "example"                  # Base domain for ingress resources
letsencrypt_env: "production"              # "production" or "staging"
cert_manager_email: "your_email@your_domain.com"  # ACME registration email
traefik_dashboard_expose: false            # Expose the Traefik dashboard

# Cloudflare API token, sourced from the vault variable CF_TOKEN
cf_token: "{{ CF_TOKEN | default('') }}"   # Maps from the vault variable CF_TOKEN

# Longhorn
longhorn_namespace: "longhorn-system"      # Namespace for Longhorn
longhorn_install_system: true              # Deploy the Longhorn chart
longhorn_create_default_storage_class: true  # Create the default StorageClass
longhorn_storage_class_name: "longhorn"    # StorageClass name
longhorn_replica_count: 3                  # Replicas per volume

# Rook-Ceph
rook_ceph_namespace: "rook-ceph"           # Namespace for Rook-Ceph
rook_ceph_min_device_capacity: "50Mi"      # Test-only; production should be >= 100Gi
rook_ceph_mon_count: 3                     # Ceph monitor daemons
rook_ceph_replica_size: 1                  # No redundancy; raise for production
rook_ceph_pool_name: "replicapool"         # Ceph RBD pool name
rook_ceph_storage_class_name: "rook-ceph-block"  # RBD StorageClass name
rook_ceph_make_storage_class_default: true  # Make RBD the default StorageClass

rook_install_operator: true                # Install the Rook operator
rook_install_cluster: true                 # Install the CephCluster and RBD StorageClass
rook_ceph_enable_filesystem: false         # Install CephFilesystem + StorageClass
rook_ceph_enable_objectstore: false        # Install CephObjectStore + StorageClass

rook_ceph_filesystem_name: "cephfs"        # CephFilesystem name
rook_ceph_fs_storage_class: "rook-cephfs"  # CephFS StorageClass name
rook_ceph_fs_make_default: false           # Make CephFS the default StorageClass
rook_ceph_objectstore_name: "ceph-objectstore"   # CephObjectStore name
rook_ceph_objectstore_storage_class: "rook-ceph-bucket"  # Object store StorageClass name
rook_ceph_objectstore_gateway_port: 80     # RGW gateway port
rook_ceph_objectstore_replicas: 1          # RGW gateway replicas

rook_ceph_operator_values:                 # Values passed to the Rook operator chart
  crds:
    enabled: true
  csi:
    enableCephFS: true
    enableRBD: true
  monitoring:
    enabled: false

# Upgrade behavior
upgrade_drain_nodes: true                  # Drain workers before upgrade
upgrade_drain_timeout: 300                 # Drain timeout (seconds)
upgrade_drain_grace_period: 30             # Pod termination grace period (seconds)
upgrade_drain_delete_emptydir_data: true   # Pass --delete-emptydir-data to drain
service_restart_delay: 30                  # Delay between service operations (seconds)
node_ready_timeout: 300                    # Wait for Ready after restart (seconds)
